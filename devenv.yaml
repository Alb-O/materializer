inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  agent-committer:
    url: github:Alb-O/agent-committer
    flake: false
  dvnv-docs-env:
    url: github:Alb-O/dvnv-docs-env
    flake: false
  dvnv-local-inputs:
    url: github:Alb-O/dvnv-local-inputs
    flake: false
imports:
  - agent-committer
  - dvnv-docs-env
  - dvnv-local-inputs
